name: Refresh live weather and Spark evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/fetch_kma_weather.py"
      - "scripts/build_spark_summary.py"
      - "dashboard-data.js"
      - ".github/workflows/refresh-live-data.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PySpark
        run: python -m pip install pyspark==3.5.3

      - name: Refresh KMA live weather
        env:
          KMA_SERVICE_KEY: ${{ secrets.KMA_SERVICE_KEY }}
        run: python scripts/fetch_kma_weather.py

      - name: Build PySpark RDD evidence
        run: python scripts/build_spark_summary.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-weather.js spark-evidence.js
          if git diff --cached --quiet; then
            echo "No generated data changes"
            exit 0
          fi
          git commit -m "Refresh live weather and Spark evidence"
          git push origin HEAD:main
          git push origin HEAD:gh-pages
